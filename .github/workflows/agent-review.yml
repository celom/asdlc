name: Agent Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: agent-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts, and skip fork PRs cleanly: forks don't receive secrets, so
    # the run would fail on a missing API key rather than review anything.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read # read-only: the reviewer must never be able to push
      pull-requests: write
      issues: write # PR summary comments go through the issues API
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The action refuses non-human actors by default. Agent PRs are
          # opened by our implement bot and MUST be reviewed — that's the
          # point of the first-pass gate. Scoped to that one bot, not "*".
          allowed_bots: 'asdlc-agent'
          # Explicit token: without it the action tries an OIDC exchange that
          # requires the official Claude GitHub App, which this repo doesn't use.
          # The default GITHUB_TOKEN is right here — review comments don't need
          # to trigger CI, and it keeps the reviewer on the least-privileged token.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Perform a first-pass review of PR #${{ github.event.pull_request.number }}.

            Review the diff for correctness bugs, security issues, and style
            inconsistencies with the surrounding code. Prioritize real problems
            over nitpicks.

            Also verify the PR body honors .github/pull_request_template.md:
            a linked issue ("Closes #N"), acceptance criteria copied from that
            issue, verification evidence (not just "looks right"), and the AI
            disclosure section. Flag any missing part explicitly.

            Post inline comments where relevant plus one summary comment. If a
            previous run of yours already posted a summary comment on this PR,
            update it with `gh pr comment ${{ github.event.pull_request.number }} --edit-last --body ...`
            instead of posting a new one, so the PR carries a single living
            review summary rather than one per push.
            Do NOT approve or request changes — the human is the approval gate.
          # Custom prompts run default-deny: every tool the reviewer needs must
          # be allowlisted, and nothing else — no push, no approve.
          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh issue view:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment"
            --max-turns 25
