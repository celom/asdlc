name: Agent Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: agent-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts, and skip fork PRs cleanly: forks don't receive secrets, so
    # the run would fail on a missing API key rather than review anything.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read # read-only: the reviewer must never be able to push
      pull-requests: write
      issues: write # PR summary comments go through the issues API
    steps:
      - uses: actions/checkout@v4

      # Needed to run the fail-soft metrics parser (TypeScript) in the post-step.
      # This adds no permissions; the review job stays on contents: read.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The action refuses non-human actors by default. Agent PRs are
          # opened by our implement bot and MUST be reviewed — that's the
          # point of the first-pass gate. Scoped to that one bot, not "*".
          allowed_bots: 'asdlc-agent'
          # Explicit token: without it the action tries an OIDC exchange that
          # requires the official Claude GitHub App, which this repo doesn't use.
          # The default GITHUB_TOKEN is right here — review comments don't need
          # to trigger CI, and it keeps the reviewer on the least-privileged token.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Perform a first-pass review of PR #${{ github.event.pull_request.number }}.

            Review the diff for correctness bugs, security issues, and style
            inconsistencies with the surrounding code. Prioritize real problems
            over nitpicks.

            Also verify the PR body honors .github/pull_request_template.md:
            a linked issue ("Closes #N"), acceptance criteria copied from that
            issue, verification evidence (not just "looks right"), and the AI
            disclosure section. Flag any missing part explicitly.

            Post inline comments where relevant plus one summary comment. If a
            previous run of yours already posted a summary comment on this PR,
            update it with `gh pr comment ${{ github.event.pull_request.number }} --edit-last --body ...`
            instead of posting a new one, so the PR carries a single living
            review summary rather than one per push.
            Do NOT approve or request changes — the human is the approval gate.
          # Surface the per-turn transcript so denial diagnosis is evidence-based
          # instead of blind. The reviewer's context is public PR data on a
          # read-only token; the transcript exposes no secrets.
          show_full_output: true
          # Custom prompts run default-deny: every tool the reviewer needs must
          # be allowlisted, and nothing else — no push, no approve. The Bash
          # entries are read-only utilities (inspect, never mutate); nothing
          # write-capable, network-facing, or repo-administrative is added.
          # The cap and this allowlist were tuned from PR #26 bring-up data,
          # where a marginal turn budget was half-burned on permission denials.
          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(grep:*),Bash(jq:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr checks:*),Bash(gh issue view:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment"
            --max-turns 50

      # Metrics post-step, mirroring agent-implement.yml. Fail-soft and
      # if: always(), so an errored review still leaves a record. Uploading an
      # artifact needs no write scope, so the review job keeps contents: read —
      # the reviewer must never be able to push.
      - name: Collect run metrics
        if: always()
        env:
          METRICS_TRIGGER: ${{ github.event.pull_request.number }}
        run: |
          bun scripts/metrics/parse-execution.ts "${{ steps.claude.outputs.execution_file }}" > run-metrics.ndjson
          {
            echo "### Run metrics"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            jq -r '
              "| workflow | \(.workflow) |",
              "| trigger | \(.trigger) |",
              "| conclusion | \(.conclusion) |",
              "| cost_usd | \(.cost_usd) |",
              "| num_turns | \(.num_turns) |",
              "| duration_ms | \(.duration_ms) |"
            ' run-metrics.ndjson
            if [ "$(jq '.parse_warnings | length' run-metrics.ndjson)" != "0" ]; then
              echo ""
              echo "**Parse warnings**"
              jq -r '.parse_warnings[] | "- \(.)"' run-metrics.ndjson
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload run metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-metrics
          path: run-metrics.ndjson
