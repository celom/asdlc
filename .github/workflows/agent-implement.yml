name: Agent Implement

on:
  issues:
    types: [labeled]

# One run per issue: re-labeling while a run is in flight must not race it
# into duplicate branches/PRs (each run is also billed).
concurrency:
  group: agent-implement-${{ github.event.issue.number }}
  cancel-in-progress: false

env:
  # Pinned gitleaks release installed on the runner for the pre-push secret
  # scan. Keep this in lockstep with GITLEAKS_VERSION in
  # .github/workflows/ci.yml.
  GITLEAKS_VERSION: 8.29.1

jobs:
  implement:
    if: github.event.label.name == 'agent:implement'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      # A custom GitHub App token (not GITHUB_TOKEN) so the agent's pushes come
      # from a bot identity and its PRs still trigger CI. See docs/phase-2-agents.md.
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install the pinned gitleaks binary so the agent's verify step can run
      # the secret scan before pushing — catching a leak before a billed review
      # cycle. Installed here (plain shell) rather than by the agent: the
      # runner's Claude tool allowlist has no curl/tar, and this is the same
      # scan `checks` runs, using the same pinned version and .gitleaks.toml.
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          sudo tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            Implement issue #${{ github.event.issue.number }} in this repository.

            1. Read the issue with `gh issue view ${{ github.event.issue.number }}`.
               Its acceptance criteria are the contract. If it links a parent
               spec, read that too.
            2. Create a branch named agent/issue-${{ github.event.issue.number }}-<slug>.
            3. Implement the change with tests, following existing patterns.
            4. Verify before pushing:
               bun install --frozen-lockfile && bun run format:check && bun run typecheck && bun run test && bun run build && gitleaks git --no-banner --redact
            5. Open a PR whose body follows .github/pull_request_template.md exactly:
               - "Closes #${{ github.event.issue.number }}" in the linked issue section.
               - Copy the acceptance criteria from the issue verbatim as checkboxes
                 and check the ones this PR satisfies.
               - Include verification evidence (real command output, not "looks right").
               - AI disclosure: check "AI-generated"; leave "reviewed by a human"
                 unchecked — the human reviewer checks it.
            6. Comment on the issue with a link to the PR.
          # Surface the per-turn transcript so a failed implement run is
          # diagnosable instead of blind: #17's runs ended is_error: true with
          # only config + init + result in the log (run 29210573102). A public
          # repo's diffs land in public PRs anyway, so this exposes nothing new.
          show_full_output: true
          # Custom prompts run default-deny: allowlist what implementation needs.
          # Note the Bash scoping is hygiene, not a sandbox — running the
          # toolchain (bun) is arbitrary code execution by construction. The
          # control that actually gates untrusted input is the trigger: adding
          # the agent:implement label requires triage/write access to the repo.
          # The turn cap and allowlist below were tuned from Phase 3 bring-up
          # data (#16): the smallest task exhausted 40 turns amid permission
          # denials, so the cap rose to 60 and common non-destructive utilities
          # were added.
          claude_args: |
            --allowedTools "Edit,Write,Read,Grep,Glob,Bash(bun:*),Bash(git:*),Bash(gitleaks:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh pr create:*),Bash(gh pr view:*),Bash(ls:*),Bash(cat:*),Bash(mkdir:*),Bash(mv:*),Bash(cp:*),Bash(bunx:*),Bash(node:*)"
            --max-turns 60

      # Metrics are observability, never a gate: this post-step is fail-soft and
      # runs even when the agent step errored, so a run that delivers nothing
      # still leaves a record. The parser exits 0 on any input (missing/malformed
      # execution file → null metrics + parse_warnings), so nothing here fails the
      # run. The record is uploaded as the `run-metrics` artifact; the
      # workflow_run-triggered metrics-collect.yml appends it to metrics:runs.ndjson.
      - name: Collect run metrics
        if: always()
        env:
          METRICS_TRIGGER: ${{ github.event.issue.number }}
        run: |
          bun scripts/metrics/parse-execution.ts "${{ steps.claude.outputs.execution_file }}" > run-metrics.ndjson
          {
            echo "### Run metrics"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            jq -r '
              "| workflow | \(.workflow) |",
              "| trigger | \(.trigger) |",
              "| conclusion | \(.conclusion) |",
              "| cost_usd | \(.cost_usd) |",
              "| num_turns | \(.num_turns) |",
              "| duration_ms | \(.duration_ms) |"
            ' run-metrics.ndjson
            if [ "$(jq '.parse_warnings | length' run-metrics.ndjson)" != "0" ]; then
              echo ""
              echo "**Parse warnings**"
              jq -r '.parse_warnings[] | "- \(.)"' run-metrics.ndjson
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload run metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-metrics
          path: run-metrics.ndjson
