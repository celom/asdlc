name: Spec
description: Define what to build before building it. Specs are the entry point of the pipeline.
title: '[Spec] '
labels: [spec]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What need or gap does this address? Why now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be built, at the level of behavior and boundaries — not implementation detail.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Verifiable statements that define "done". These become the contract for implementation tasks and their tests.
      placeholder: |
        - [ ] Given X, when Y, then Z
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What this spec deliberately does not cover.
  - type: textarea
    id: open-questions
    attributes:
      label: Open questions
      description: Ambiguities that must be resolved before or during implementation.
